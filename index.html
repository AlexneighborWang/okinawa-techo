<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>沖繩旅遊2026</title>
    <meta name="theme-color" content="#7BBFEA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="沖繩2026" />
    <link rel="apple-touch-icon" href="/okinawa-techo/icon.jpg" />
    <link rel="icon" type="image/jpeg" href="/okinawa-techo/icon.jpg" />
    <link rel="manifest" href="/okinawa-techo/manifest.webmanifest" />
    <script>
      // 監聽全局錯誤，防止更新導致的空白畫面
      window.addEventListener('error', (e) => {
        if (e.target.tagName === 'SCRIPT') {
          console.error('偵測到資源載入失敗，準備重新整理...', e.target.src);
          // 資源失敗，可能是因為版本更新導致舊檔案消失
          if (!window.location.search.includes('retry=true')) {
            window.location.search = '?retry=true';
          }
        }
      }, true);

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/okinawa-techo/sw.js').then(reg => {
            // 當發現有新版本時，自動更新
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    console.log('新版本已就緒，請重新載入');
                    // 這裡可以選擇自動重整或提醒使用者
                    // window.location.reload(); 
                  }
                }
              };
            };
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
